<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Village Eats</title>
    <script>
      (function () {
        var pathSegmentsToKeep = 1;
        var location = window.location;
        var basePath = location.pathname
          .split("/")
          .slice(0, 1 + pathSegmentsToKeep)
          .join("/");
        var routePath = location.pathname
          .slice(1)
          .split("/")
          .slice(pathSegmentsToKeep)
          .join("/")
          .replace(/&/g, "~and~");

        var redirectUrl =
          location.protocol +
          "//" +
          location.hostname +
          (location.port ? ":" + location.port : "") +
          basePath +
          "/?/" +
          routePath +
          (location.search ? "&" + location.search.slice(1).replace(/&/g, "~and~") : "") +
          location.hash;

        location.replace(redirectUrl);
      })();
    </script>
  </head>
  <body></body>
</html>
